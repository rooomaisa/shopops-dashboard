server:
  port: ${PORT:8080}

spring:
  application:
    name: shopops-api

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/shopops}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
  jwt:
    secret: ${JWT_SECRET:shopops-local-dev-jwt-secret-change-me-32chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  seed:
    enabled: ${SEED_ENABLED:true}
