spring:
  datasource:
    url: jdbc:h2:mem:shopops_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  cors:
    allowed-origins: http://localhost:5173
  seed:
    enabled: false
